name: Build Native Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
    
    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PATH:$PWD/gradle-8.2/bin
    
    - name: Build APK
      run: |
        export PATH=$PATH:$PWD/gradle-8.2/bin
        gradle assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MeganMovies-Native
        path: app/build/outputs/apk/debug/app-debug.apk
